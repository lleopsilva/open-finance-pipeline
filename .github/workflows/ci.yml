name: CI — Open Finance Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Rodar testes
        run: |
          pytest tests/ -v --tb=short

      - name: Verificar qualidade do código
        run: |
          pip install flake8
          flake8 src/ dags/ --max-line-length=100 --ignore=E501